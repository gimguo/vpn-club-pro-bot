services:
  db:
    image: postgres:15-alpine
    container_name: vpn_bot_db
    environment:
      POSTGRES_DB: vpn_club
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - vpn_postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    restart: unless-stopped
    networks:
      - vpn_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vpn_bot_redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - vpn_bot_network

  bot:
    build: .
    container_name: vpn_bot_app
    user: "0:0"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_password@db:5432/vpn_club
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - vpn_bot_network
    command: >
      sh -c "pip install -q --no-warn-script-location asyncssh httpx 2>&1 | tail -5; echo '=== Starting bot ==='; exec python main.py"
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py:ro
      - ./config.py:/app/config.py:ro
      - ./requirements.txt:/app/requirements.txt:ro
      - ./logs:/app/logs
      - /home/andrey/.ssh/vpn_forge:/root/.ssh/vpn_forge:ro

  nginx:
    image: nginx:alpine
    container_name: vpn_bot_nginx
    ports:
      - "8080:80"
      - "8443:443"
      - "9000:9000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - bot
    restart: unless-stopped
    networks:
      - vpn_bot_network

networks:
  vpn_bot_network:
    name: vpn_bot_network
    driver: bridge

volumes:
  vpn_postgres_data:
