events {
    worker_connections 1024;
}

http {
    upstream bot_backend {
        server bot:9000;
    }

    upstream api_backend {
        server bot:8000;
    }

    # HTTP endpoint behind external reverse proxy (e.g. NPM/Cloudflare)
    server {
        listen 80;
        server_name vpn-club-pro-bot.korolev.tech bot.korolev.tech vm16784.hosted-by.it-garage.pro;

        # Telegram webhook endpoint
        location /webhook/telegram {
            proxy_pass http://bot_backend/webhook/telegram;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # YooKassa webhook endpoint
        location /webhook/yookassa {
            proxy_pass http://api_backend/webhook/yookassa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check / root
        location / {
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server for Telegram webhook
    server {
        listen 443 ssl;
        http2 on;
        server_name vpn-club-pro-bot.korolev.tech bot.korolev.tech vm16784.hosted-by.it-garage.pro;

        # SSL configuration (self-signed for now)
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Telegram webhook endpoint
        location /webhook/telegram {
            proxy_pass http://bot_backend/webhook/telegram;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # YooKassa webhook endpoint
        location /webhook/yookassa {
            proxy_pass http://api_backend/webhook/yookassa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location / {
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Direct HTTP access to port 9000 for internal testing
    server {
        listen 9000;
        server_name vpn-club-pro-bot.korolev.tech bot.korolev.tech vm16784.hosted-by.it-garage.pro;

        location / {
            proxy_pass http://bot_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
} 